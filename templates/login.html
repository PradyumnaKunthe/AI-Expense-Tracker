<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container d-flex justify-content-center align-items-center"
         style="height: 100vh;">

        <div class="glass-card p-5"
             style="width: 400px;">

            <h2 class="text-center mb-4">

                Login

            </h2>

            <form method="POST">

                <div class="mb-3">

                    <input type="email"
                           class="form-control"
                           placeholder="Enter email"
                           name="email"
                           required>

                </div>

                <div class="mb-3">

                    <input type="password"
                           class="form-control"
                           placeholder="Enter password"
                           name="password"
                           required>

                </div>

                <button class="btn btn-primary w-100">

                    Login

                </button>

            </form>

            <p class="text-center mt-3">

                Don't have account?

                <a href="/signup">

                    Signup

                </a>

            </p>

        </div>

    </div>

</body>

</html>
